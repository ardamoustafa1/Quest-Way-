<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ country }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="country-title">{{ country }}</h1>
        <div class="categories">
            <a href="{{ url_for('details', country_name=country, section='famous_places') }}" class="category-link">Famous Places</a>
            <a href="{{ url_for('details', country_name=country, section='top_hotels') }}" class="category-link">Top Hotels</a>
            <a href="{{ url_for('details', country_name=country, section='top_restaurants') }}" class="category-link">Top Restaurants</a>
            <a href="{{ url_for('details', country_name=country, section='famous_dishes') }}" class="category-link">Famous Dishes</a>
            <a href="{{ url_for('details', country_name=country, section='transport') }}" class="category-link">Transport</a>
        </div>
    </div>
</body>
</html>
